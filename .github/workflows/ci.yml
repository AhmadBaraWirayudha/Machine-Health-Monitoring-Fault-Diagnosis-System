# =============================================================
# .github/workflows/ci.yml
# CI/CD Pipeline — Machine Health Monitoring System
# =============================================================
# Triggers: push to main/develop, pull requests to main
#
# Jobs:
#   lint     — flake8 code style check
#   test     — pytest unit tests (Python 3.10, 3.11, 3.12)
#   pipeline — smoke-test the full data pipeline (skips download)
#   docker   — build Docker image (no push on PRs)

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_DEFAULT: "3.11"

jobs:

  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install linter
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 src/ main.py \
            --max-line-length=110 \
            --ignore=E501,W503,E302 \
            --exclude=__pycache__,.venv

  # ── Unit tests ────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage
        if: matrix.python-version == env.PYTHON_DEFAULT
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Pipeline smoke test ───────────────────────────────────────────────────
  pipeline:
    name: Pipeline Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create dummy raw data (skip network download)
        run: |
          mkdir -p data/raw data/processed models reports/plots logs
          python - << 'EOF'
          import pandas as pd, numpy as np
          np.random.seed(42)
          n = 500
          df = pd.DataFrame({
              "UDI":                    range(1, n+1),
              "Product ID":             [f"M{i}" for i in range(n)],
              "Type":                   np.random.choice(["L","M","H"], n),
              "Air temperature [K]":    np.random.normal(300, 2, n),
              "Process temperature [K]":np.random.normal(310, 1.5, n),
              "Rotational speed [rpm]": np.random.normal(1500, 50, n),
              "Torque [Nm]":            np.random.normal(40, 10, n),
              "Tool wear [min]":        np.random.uniform(0, 250, n),
              "Machine failure":        np.random.binomial(1, 0.05, n),
              "TWF": 0, "HDF": 0, "PWF": 0, "OSF": 0, "RNF": 0,
          })
          df.to_csv("data/raw/ai4i2020.csv", index=False)
          print(f"Synthetic dataset created: {len(df)} rows")
          EOF

      - name: Run pipeline steps 2–7 (skip download)
        run: python main.py --skip-download --steps 2 3 4 5 6 7

      - name: Verify outputs exist
        run: |
          python - << 'EOF'
          from pathlib import Path
          expected = [
              "data/processed/ai4i_clean.csv",
              "data/processed/ai4i_features.csv",
              "data/processed/ai4i_health_scored.csv",
              "data/processed/cmdb.sqlite",
              "models/fault_classifier.joblib",
              "models/isolation_forest.joblib",
          ]
          missing = [p for p in expected if not Path(p).exists()]
          if missing:
              print("MISSING outputs:", missing)
              raise SystemExit(1)
          print("All expected outputs present ✓")
          EOF

      - name: Run alert check
        run: python src/alerts/notifier.py

  # ── Docker build ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: pipeline
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: cbm-system:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # Uncomment to push to Docker Hub on main branch:
      #
      # - name: Login to Docker Hub
      #   if: github.ref == 'refs/heads/main'
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}
      #
      # - name: Push image
      #   if: github.ref == 'refs/heads/main'
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     push: true
      #     tags: yourusername/cbm-system:latest

  # ── Notify on failure ─────────────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, test, pipeline, docker]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "CI pipeline failed on branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          # Add Slack/email notification here if needed
