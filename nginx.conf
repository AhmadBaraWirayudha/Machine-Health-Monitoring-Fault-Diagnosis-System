# =============================================================
# nginx.conf — Reverse Proxy for CBM Health Monitoring System
# =============================================================
# Routes:
#   /api/...   → FastAPI (port 8000)
#   /          → Streamlit dashboard (port 8501)
#
# Usage with docker-compose:
#   Uncomment the nginx service in docker-compose.yml, then:
#     docker compose up nginx api dashboard

worker_processes  auto;
error_log         /var/log/nginx/error.log warn;
pid               /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 50M;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=predict:10m rate=60r/m;

    # ── Upstream services ─────────────────────────────────────────────────────
    upstream fastapi {
        server api:8000;
        keepalive 16;
    }

    upstream streamlit {
        server dashboard:8501;
        keepalive 8;
    }

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen       80;
        server_name  localhost cbm.local;

        # ── Health check (nginx itself) ────────────────────────────────────
        location /nginx-health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ── REST API ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://fastapi/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            # CORS headers for browser clients
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Prediction endpoint — separate rate limit
        location /api/predict {
            limit_req zone=predict burst=10 nodelay;

            proxy_pass         http://fastapi/predict;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_read_timeout 15s;
        }

        # API docs (Swagger / ReDoc)
        location /docs {
            proxy_pass         http://fastapi/docs;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        location /redoc {
            proxy_pass         http://fastapi/redoc;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        location /openapi.json {
            proxy_pass         http://fastapi/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── Streamlit Dashboard ────────────────────────────────────────────
        location / {
            proxy_pass         http://streamlit/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 86400s;   # long timeout for SSE/WebSocket
            proxy_buffering    off;
        }

        # Streamlit static assets
        location /_stcore/ {
            proxy_pass         http://streamlit/_stcore/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # ── Static portfolio page ──────────────────────────────────────────
        location /portfolio/ {
            alias   /app/web/;
            index   index.html;
            try_files $uri $uri/ /web/index.html;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # ── Error pages ───────────────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error":"Service temporarily unavailable","retry_after":30}';
            add_header Content-Type application/json;
        }
    }
}
