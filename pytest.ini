[pytest]
# =============================================================
# pytest.ini — Test configuration
# Machine Health Monitoring & Fault Diagnosis System
# =============================================================

# Test discovery
testpaths       = tests
python_files    = test_*.py
python_classes  = Test*
python_functions = test_*

# Output format
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Markers (must be declared here to avoid unknown-mark warnings)
markers =
    slow:        marks tests as slow (skip with -m "not slow")
    integration: marks tests requiring full pipeline output
    db:          marks tests requiring a live SQLite database
    api:         marks tests requiring FastAPI / httpx

# Logging
log_cli             = false
log_cli_level       = WARNING
log_file            = logs/pytest.log
log_file_level      = DEBUG
log_file_format     = %(asctime)s [%(levelname)-8s] %(name)s — %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Timeouts (requires pytest-timeout: pip install pytest-timeout)
# timeout = 60

# Ignore certain directories
norecursedirs =
    .git
    .venv
    venv
    build
    dist
    __pycache__
    *.egg-info
    data
    models
    reports
    notebooks
