version: "3.9"

# =============================================================
# docker-compose.yml — CBM Health Monitoring System
# =============================================================
# Services:
#   pipeline   — runs the full 8-step data pipeline
#   api        — FastAPI REST server  (port 8000)
#   dashboard  — Streamlit web app    (port 8501)
#
# Quick start:
#   docker compose up api dashboard      # start API + dashboard
#   docker compose run --rm pipeline     # run pipeline once
#   docker compose up --build            # rebuild and start all
#
# View logs:
#   docker compose logs -f api
#
# Stop everything:
#   docker compose down

x-common: &common
  build: .
  volumes:
    - ./data:/app/data
    - ./models:/app/models
    - ./reports:/app/reports
    - ./logs:/app/logs
  environment:
    - PYTHONUNBUFFERED=1
    - LOG_LEVEL=INFO
  restart: unless-stopped

services:

  # ── Pipeline (one-shot) ───────────────────────────────────────────────────
  pipeline:
    <<: *common
    container_name: cbm_pipeline
    command: ["pipeline"]
    restart: "no"                # run once, then exit
    profiles: ["pipeline"]       # only starts with: docker compose --profile pipeline up

  # ── REST API ──────────────────────────────────────────────────────────────
  api:
    <<: *common
    container_name: cbm_api
    command: ["api"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cbm-api.rule=Host(`api.cbm.local`)"

  # ── Streamlit Dashboard ───────────────────────────────────────────────────
  dashboard:
    <<: *common
    container_name: cbm_dashboard
    command: ["dashboard"]
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false

  # ── Nginx reverse proxy (optional) ───────────────────────────────────────
  # Uncomment to serve both API and dashboard behind a single domain.
  #
  # nginx:
  #   image: nginx:alpine
  #   container_name: cbm_nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - api
  #     - dashboard

volumes:
  # Named volumes for persistence between container restarts
  cbm_data:
    driver: local
  cbm_models:
    driver: local

networks:
  default:
    name: cbm_network
